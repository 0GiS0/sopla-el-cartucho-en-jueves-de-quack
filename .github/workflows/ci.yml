name: 🔍 CI — ESLint & Prettier

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    name: 🧹 Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔎 ESLint
        run: npm run lint

      - name: 💅 Prettier
        run: npm run format:check
